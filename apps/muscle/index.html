<!DOCTYPE html>
<html lang="ja">
<head>
<script>
/* ===== 統合アプリ用ガード（自動挿入・元コードは未変更）=====
   iframe 内で動くとき、各アプリ独自の Service Worker 登録／キャッシュ操作／
   バージョン確認を無効化し、キャッシュとバージョン管理を親（統合ホーム）へ
   一元化します。localStorage（学習データ・カルテ等）はそのまま使えます。 */
(function(){
  try{
    if (window.top === window.self) return; // 単体起動時は何もしない

    // 1) Service Worker を無害なスタブに
    var swStub = {
      register:function(){ return Promise.reject(new Error('SW disabled in integrated app')); },
      getRegistration:function(){ return Promise.resolve(undefined); },
      getRegistrations:function(){ return Promise.resolve([]); },
      addEventListener:function(){}, removeEventListener:function(){},
      get controller(){ return null; },
      ready:new Promise(function(){})
    };
    try{ Object.defineProperty(navigator,'serviceWorker',{get:function(){return swStub;},configurable:true}); }catch(e){}

    // 2) Cache Storage を無効化（子アプリが親のキャッシュを消さないように）
    var noop0=function(){return Promise.resolve();};
    function neutralizeCaches(){
      try{
        var cacheStub={
          open:function(){return Promise.resolve({addAll:noop0,add:noop0,put:noop0,
            match:function(){return Promise.resolve(undefined);},delete:function(){return Promise.resolve(false);},
            keys:function(){return Promise.resolve([]);}});},
          keys:function(){return Promise.resolve([]);},
          delete:function(){return Promise.resolve(false);},
          match:function(){return Promise.resolve(undefined);},
          has:function(){return Promise.resolve(false);}
        };
        try{ Object.defineProperty(window,'caches',{get:function(){return cacheStub;},configurable:true}); }
        catch(e){
          // defineProperty が不可なら既存オブジェクトのメソッドを直接無害化
          if(window.caches){
            try{ window.caches.keys=function(){return Promise.resolve([]);}; }catch(_){}
            try{ window.caches.delete=function(){return Promise.resolve(false);}; }catch(_){}
            try{ window.caches.open=cacheStub.open; }catch(_){}
          }
        }
      }catch(e){}
    }
    neutralizeCaches();

    // 3) アプリ独自の「更新」ボタンを隠す（親の「更新確認」に一本化）
    var css='/* muscle: 非表示にする独自要素なし */';
    function injectCss(){ try{ var s=document.createElement('style'); s.textContent=css; (document.head||document.documentElement).appendChild(s);}catch(e){} }
    if(document.head){ injectCss(); }
    else { document.addEventListener('DOMContentLoaded', injectCss); }
  }catch(e){}

    // ===== コピー無効化（コンテンツ保護）=====
    // テキスト選択・右クリック・長押しを抑止。ただし入力欄は除外（カルテ/検索/メモは操作可）。
    var cpCss = document.createElement('style');
    cpCss.textContent =
      'html{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;' +
      '-webkit-touch-callout:none;}' +
      'input,textarea,[contenteditable="true"],[contenteditable=""]{' +
      '-webkit-user-select:text !important;-moz-user-select:text !important;' +
      '-ms-user-select:text !important;user-select:text !important;-webkit-touch-callout:default !important;}';
    (document.head||document.documentElement).appendChild(cpCss);
    var isEditable = function(t){
      if(!t) return false;
      var tag=(t.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea') return true;
      if(t.isContentEditable) return true;
      return false;
    };
    document.addEventListener('contextmenu', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});
    document.addEventListener('copy', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});
    document.addEventListener('cut', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});
    document.addEventListener('dragstart', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});

  })();
</script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MUSCLE NAVIGATOR</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --card: #1c1c1c;
    --accent: #e8ff00;
    --accent2: #ff4444;
    --text: #f0f0f0;
    --muted: #666;
    --border: #2a2a2a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Noto Sans JP',sans-serif; min-height:100vh; overflow-x:hidden; }

  header { padding:2rem 2rem 1rem; border-bottom:1px solid var(--border); display:flex; align-items:flex-end; gap:1rem; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:clamp(2.2rem,7vw,4.5rem); letter-spacing:0.05em; line-height:1; color:var(--accent); }
  header span { font-size:0.75rem; color:var(--muted); letter-spacing:0.2em; text-transform:uppercase; padding-bottom:0.4rem; }

  .mode-tabs { display:flex; margin:2rem 2rem 0; border-bottom:1px solid var(--border); }
  .tab-btn { flex:1; padding:1rem 1rem; background:transparent; border:none; color:var(--muted); font-family:'Noto Sans JP',sans-serif; font-size:0.82rem; cursor:pointer; transition:all 0.2s; border-bottom:3px solid transparent; text-align:left; }
  .tab-btn .tab-num { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; display:block; line-height:1; margin-bottom:0.15rem; }
  .tab-btn.active { color:var(--text); border-bottom-color:var(--accent); }
  .tab-btn.active .tab-num { color:var(--accent); }

  .panel { display:none; padding:2rem; animation:fadeIn 0.3s ease; }
  .panel.active { display:block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }

  .section-label { font-size:0.7rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); margin-bottom:1rem; }

  .muscle-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(100px,1fr)); gap:0.6rem; margin-bottom:1.5rem; }
  .muscle-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:0.7rem 0.4rem; border-radius:4px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.78rem; text-align:center; transition:all 0.15s; line-height:1.4; }
  .muscle-btn .icon { font-size:1.3rem; display:block; margin-bottom:0.2rem; }
  .muscle-btn:hover { border-color:var(--accent); color:var(--accent); }
  .muscle-btn.selected { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }

  .symptom-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(145px,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
  .symptom-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:1rem; border-radius:4px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.85rem; text-align:left; transition:all 0.15s; }
  .symptom-btn .s-icon { font-size:1.5rem; display:block; margin-bottom:0.35rem; }
  .symptom-btn .s-name { font-weight:700; display:block; }
  .symptom-btn .s-desc { font-size:0.68rem; color:var(--muted); margin-top:0.15rem; }
  .symptom-btn.selected { background:#2a0000; border-color:var(--accent2); }
  .symptom-btn.selected .s-name { color:var(--accent2); }

  /* ===== ストレッチ/セルフケア ===== */
  .care-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:0.75rem; margin-bottom:1.5rem; }
  .care-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.1rem; cursor:pointer; text-align:left; transition:all 0.15s; position:relative; overflow:hidden; }
  .care-card::after { content:''; position:absolute; right:-20px; top:-20px; width:60px; height:60px; border-radius:50%; background:var(--accent); opacity:0.06; transition:opacity 0.2s; }
  .care-card:hover { border-color:var(--accent); transform:translateY(-2px); }
  .care-card:hover::after { opacity:0.14; }
  .care-card.selected { border-color:var(--accent); background:#161a00; }
  .care-card .c-icon { font-size:1.7rem; display:block; margin-bottom:0.4rem; }
  .care-card .c-name { font-weight:700; font-size:0.92rem; display:block; }
  .care-card .c-meta { font-size:0.68rem; color:var(--accent); margin-top:0.3rem; letter-spacing:0.05em; }
  .care-card .c-desc { font-size:0.7rem; color:var(--muted); margin-top:0.35rem; line-height:1.6; }

  .generate-btn { width:100%; padding:1rem; background:var(--accent); border:none; border-radius:4px; color:#000; font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.15em; cursor:pointer; transition:all 0.2s; margin-bottom:2rem; }
  .generate-btn:hover { background:#fff; transform:translateY(-1px); }
  .generate-btn:disabled { background:#333; color:var(--muted); cursor:not-allowed; transform:none; }
  .generate-btn-red { background:var(--accent2); color:#fff; }
  .generate-btn-red:hover { background:#ff6666; }

  .results { display:none; }
  .results.visible { display:block; }
  .results-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.2rem; padding-bottom:1rem; border-bottom:1px solid var(--border); }
  .results-title { font-family:'Bebas Neue',sans-serif; font-size:1.8rem; letter-spacing:0.05em; }
  .results-count { font-size:0.75rem; color:var(--muted); letter-spacing:0.1em; }

  .plan-summary { background:#0f0f0f; border:1px solid var(--border); border-radius:6px; padding:1.1rem 1.25rem; margin-bottom:1.25rem; font-size:0.82rem; color:#aaa; line-height:1.8; }
  .plan-summary strong { color:var(--text); }

  .exercise-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.25rem; margin-bottom:0.6rem; cursor:pointer; position:relative; overflow:hidden; transition:border-color 0.15s; }
  .exercise-card::before { content:''; position:absolute; left:0;top:0;bottom:0; width:3px; background:var(--accent); }
  .exercise-card.symptom::before { background:var(--accent2); }
  .exercise-card:hover { border-color:#444; }
  .card-top { display:flex; justify-content:space-between; align-items:flex-start; gap:0.5rem; }
  .ex-name { font-weight:700; font-size:0.95rem; margin-bottom:0.25rem; }
  .ex-target { font-size:0.7rem; color:var(--accent); letter-spacing:0.08em; }
  .ex-target.red { color:var(--accent2); }
  .ex-badges { display:flex; gap:0.4rem; flex-wrap:wrap; margin-top:0.45rem; }
  .badge { font-size:0.65rem; padding:0.18rem 0.5rem; border-radius:2px; background:#222; color:var(--muted); white-space:nowrap; }
  .toggle-icon { font-size:0.9rem; color:var(--muted); flex-shrink:0; transition:transform 0.2s; margin-top:0.2rem; }
  .exercise-card.open .toggle-icon { transform:rotate(180deg); }
  .ex-detail { display:none; margin-top:1rem; padding-top:1rem; border-top:1px solid var(--border); font-size:0.82rem; color:#bbb; line-height:1.75; }
  .ex-detail.open { display:block; animation:fadeIn 0.2s ease; }
  .ex-sets { margin-top:0.75rem; display:flex; gap:0.5rem; flex-wrap:wrap; }
  .set-box { background:#0a0a0a; border:1px solid var(--border); border-radius:3px; padding:0.4rem 0.75rem; font-size:0.78rem; text-align:center; }
  .set-box span { display:block; font-size:0.6rem; color:var(--muted); }
  .caution-text { margin-top:0.75rem; color:#ffcc44; font-size:0.75rem; }

  /* ===== form points & how-to ===== */
  .ex-howto { color:#cfcfcf; }
  .ex-howto strong { color:var(--accent); font-size:0.78rem; letter-spacing:0.05em; }
  .form-points { background:#0d0f00; border:1px solid #33370a; border-radius:5px; padding:0.75rem 0.9rem; margin-top:0.8rem; }
  .form-points .fp-title { color:var(--accent); font-size:0.74rem; font-weight:700; letter-spacing:0.05em; margin-bottom:0.45rem; }
  .form-points ul { list-style:none; padding:0; margin:0; }
  .form-points li { font-size:0.78rem; color:#cfcfcf; padding:0.18rem 0 0.18rem 1.1rem; position:relative; line-height:1.55; }
  .form-points li::before { content:'▸'; position:absolute; left:0; color:var(--accent); }

  .to-workout-btn { margin-top:0.9rem; width:100%; padding:0.65rem; background:#0a0a0a; border:1px solid var(--accent); color:var(--accent); border-radius:4px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.82rem; font-weight:700; transition:all 0.15s; }
  .to-workout-btn:hover { background:var(--accent); color:#000; }
  .to-workout-btn.added { background:#161a00; color:var(--accent); border-color:#33370a; }

  /* ===== result filters ===== */
  .filter-section { background:#0f0f0f; border:1px solid var(--border); border-radius:6px; padding:1rem 1.1rem; margin-bottom:1.25rem; }
  .filter-section .filter-label { font-size:0.68rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin:0 0 0.5rem; }
  .filter-section .filter-label:not(:first-child) { margin-top:1rem; }
  .filter-chips { display:flex; flex-wrap:wrap; gap:0.5rem; }

  /* ===== floating workout bar ===== */
  .workout-fab { position:fixed; bottom:1.2rem; right:1.2rem; left:1.2rem; max-width:480px; margin:0 auto; background:linear-gradient(135deg,#1c1c1c,#262600); border:1px solid var(--accent); border-radius:10px; padding:0.9rem 1.1rem; display:none; align-items:center; justify-content:space-between; gap:0.8rem; box-shadow:0 8px 30px rgba(0,0,0,0.6); z-index:50; animation:fadeIn 0.3s ease; }
  .workout-fab.visible { display:flex; }
  .workout-fab .wf-info { font-size:0.82rem; }
  .workout-fab .wf-count { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; color:var(--accent); line-height:1; }
  .workout-fab .wf-label { font-size:0.66rem; color:var(--muted); letter-spacing:0.1em; }
  .workout-fab .wf-start { background:var(--accent); border:none; color:#000; font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.1em; padding:0.55rem 1.3rem; border-radius:6px; cursor:pointer; transition:all 0.15s; }
  .workout-fab .wf-start:hover { background:#fff; }
  .workout-fab .wf-view { background:transparent; border:none; color:var(--muted); font-size:0.72rem; cursor:pointer; text-decoration:underline; }

  /* ===== timer overlay ===== */
  .timer-overlay { position:fixed; inset:0; background:rgba(8,8,8,0.97); z-index:100; display:none; flex-direction:column; padding:1.5rem; overflow-y:auto; }
  .timer-overlay.visible { display:flex; animation:fadeIn 0.25s ease; }
  .timer-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
  .timer-head .th-progress { font-size:0.78rem; color:var(--muted); letter-spacing:0.1em; }
  .timer-head .th-close { background:transparent; border:1px solid var(--border); color:var(--muted); border-radius:4px; padding:0.4rem 0.8rem; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.78rem; }
  .timer-head .th-close:hover { border-color:var(--accent2); color:var(--accent2); }
  .timer-progress-bar { height:6px; background:#1a1a1a; border-radius:3px; overflow:hidden; margin-bottom:1.5rem; }
  .timer-progress-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
  .timer-main { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .timer-phase { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.2em; color:var(--accent); margin-bottom:0.3rem; }
  .timer-phase.rest { color:#4caf50; }
  .timer-ex-name { font-size:1.5rem; font-weight:700; margin-bottom:0.3rem; line-height:1.3; }
  .timer-ex-meta { font-size:0.9rem; color:#aaa; margin-bottom:1.5rem; }
  .timer-ring { position:relative; width:240px; height:240px; margin:0 auto 1.5rem; }
  .timer-ring svg { transform:rotate(-90deg); }
  .timer-ring .ring-bg { fill:none; stroke:#1a1a1a; stroke-width:12; }
  .timer-ring .ring-fg { fill:none; stroke:var(--accent); stroke-width:12; stroke-linecap:round; transition:stroke-dashoffset 0.3s linear; }
  .timer-ring.rest .ring-fg { stroke:#4caf50; }
  .timer-count { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; }
  .timer-count .tc-num { font-family:'Bebas Neue',sans-serif; font-size:4.5rem; line-height:1; color:var(--text); }
  .timer-count .tc-sub { font-size:0.8rem; color:var(--muted); margin-top:0.3rem; }
  .timer-formpts { background:#0d0f00; border:1px solid #33370a; border-radius:6px; padding:0.8rem 1rem; max-width:420px; width:100%; margin:0 auto 1.5rem; text-align:left; }
  .timer-formpts .tf-title { color:var(--accent); font-size:0.72rem; font-weight:700; margin-bottom:0.4rem; }
  .timer-formpts ul { list-style:none; padding:0; margin:0; }
  .timer-formpts li { font-size:0.76rem; color:#cfcfcf; padding:0.15rem 0 0.15rem 1rem; position:relative; }
  .timer-formpts li::before { content:'▸'; position:absolute; left:0; color:var(--accent); }
  .timer-controls { display:flex; gap:0.7rem; justify-content:center; max-width:420px; width:100%; margin:0 auto; flex-wrap:wrap; }
  .timer-btn { flex:1; min-width:90px; padding:0.85rem; border-radius:6px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.9rem; font-weight:700; border:1px solid var(--border); background:var(--card); color:var(--text); transition:all 0.15s; }
  .timer-btn:hover { border-color:var(--accent); }
  .timer-btn.primary { background:var(--accent); color:#000; border-color:var(--accent); }
  .timer-btn.primary:hover { background:#fff; }
  .timer-btn.danger { color:var(--accent2); border-color:#3a1010; }

  /* workout review (pre-start) */
  .workout-review { max-width:480px; margin:0 auto; width:100%; }
  .wr-item { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:0.8rem 1rem; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; gap:0.6rem; }
  .wr-item .wr-name { font-weight:700; font-size:0.88rem; }
  .wr-item .wr-meta { font-size:0.68rem; color:var(--muted); margin-top:0.15rem; }
  .wr-item .wr-x { color:var(--accent2); cursor:pointer; font-size:1.1rem; }
  .wr-settings { background:#0f0f0f; border:1px solid var(--border); border-radius:6px; padding:1rem 1.1rem; margin:1rem 0; }
  .wr-settings .wrs-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.7rem; font-size:0.85rem; }
  .wr-settings .wrs-row:last-child { margin-bottom:0; }
  .wr-settings input { width:90px; background:#0a0a0a; border:1px solid var(--border); color:var(--text); padding:0.4rem 0.6rem; border-radius:4px; font-family:'Noto Sans JP',sans-serif; font-size:0.85rem; text-align:center; }

  .mm-start-btn { width:100%; margin-top:0.9rem; padding:0.75rem; background:var(--accent); border:none; color:#000; border-radius:6px; cursor:pointer; font-family:'Bebas Neue',sans-serif; font-size:1.25rem; letter-spacing:0.08em; transition:all 0.15s; }
  .mm-start-btn:hover { background:#fff; }

  /* タイマー方式の選択 */
  .mode-select { margin:1.1rem 0; }
  .mode-select .ms-label { font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); margin-bottom:0.5rem; }
  .mode-opt { display:block; width:100%; text-align:left; background:#0f0f0f; border:1px solid var(--border); border-radius:6px; padding:0.85rem 1rem; margin-bottom:0.55rem; cursor:pointer; transition:all 0.15s; color:var(--text); font-family:'Noto Sans JP',sans-serif; }
  .mode-opt:hover { border-color:var(--accent); }
  .mode-opt.selected { border-color:var(--accent); background:#161a00; }
  .mode-opt .mo-name { font-weight:700; font-size:0.92rem; display:flex; align-items:center; gap:0.5rem; }
  .mode-opt .mo-name .mo-radio { width:16px; height:16px; border-radius:50%; border:2px solid var(--muted); flex-shrink:0; display:inline-block; position:relative; }
  .mode-opt.selected .mo-name .mo-radio { border-color:var(--accent); }
  .mode-opt.selected .mo-name .mo-radio::after { content:''; position:absolute; inset:3px; border-radius:50%; background:var(--accent); }
  .mode-opt .mo-desc { font-size:0.74rem; color:var(--muted); margin-top:0.4rem; line-height:1.6; padding-left:1.5rem; }

  .timer-phase.hold { color:#ff9d2e; }
  .timer-ring.hold .ring-fg { stroke:#ff9d2e; }

  /* ===== レベル判定モード ===== */
  .quiz-q { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1.1rem 1.25rem; margin-bottom:0.8rem; }
  .quiz-q .q-title { font-size:0.9rem; font-weight:700; margin-bottom:0.7rem; }
  .quiz-q .q-title .q-no { color:var(--accent); font-family:'Bebas Neue',sans-serif; font-size:1.2rem; margin-right:0.5rem; }
  .quiz-q .q-sub { font-size:0.7rem; color:var(--muted); margin-bottom:0.7rem; line-height:1.6; }
  .opt-row { display:flex; flex-wrap:wrap; gap:0.5rem; }
  .opt-btn { background:#0a0a0a; border:1px solid var(--border); color:var(--text); padding:0.55rem 0.9rem; border-radius:4px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.8rem; transition:all 0.15s; }
  .opt-btn:hover { border-color:var(--accent); }

  .level-result { display:none; margin-top:1.5rem; }

  .level-badge-big { text-align:center; padding:2rem 1rem; border-radius:8px; margin-bottom:1.25rem; border:1px solid var(--border); background:linear-gradient(135deg,#0f0f0f,#1a1a1a); }

  .level-bar-fill { height:100%; background:linear-gradient(90deg,#4caf50,#e8ff00,#ff4444); border-radius:4px; transition:width 0.6s ease; }

  /* ===== カスタマイズモード ===== */
  .cust-toolbar { display:flex; flex-wrap:wrap; gap:0.6rem; align-items:center; margin-bottom:1.25rem; }
  .filter-chip { background:var(--card); border:1px solid var(--border); color:var(--muted); padding:0.45rem 0.85rem; border-radius:20px; cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-size:0.75rem; transition:all 0.15s; }
  .filter-chip:hover { border-color:var(--accent); color:var(--text); }
  .filter-chip.active { background:var(--accent); border-color:var(--accent); color:#000; font-weight:700; }
  .search-box { background:var(--card); border:1px solid var(--border); color:var(--text); padding:0.55rem 0.9rem; border-radius:4px; font-family:'Noto Sans JP',sans-serif; font-size:0.85rem; flex:1; min-width:160px; }
  .search-box:focus { outline:none; border-color:var(--accent); }

  .cust-card { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:0.9rem 1rem; margin-bottom:0.5rem; display:flex; justify-content:space-between; align-items:center; gap:0.8rem; transition:border-color 0.15s; }
  .cust-card:hover { border-color:#444; }
  .cust-card.added { border-color:var(--accent); background:#161a00; }
  .cust-card .cc-info { flex:1; min-width:0; }
  .cust-card .cc-name { font-weight:700; font-size:0.88rem; }
  .cust-card .cc-meta { font-size:0.68rem; color:var(--muted); margin-top:0.2rem; }
  .cust-card .cc-meta .lv { color:var(--accent); }
  .add-btn { background:#0a0a0a; border:1px solid var(--accent); color:var(--accent); width:34px; height:34px; border-radius:50%; cursor:pointer; font-size:1.3rem; line-height:1; flex-shrink:0; transition:all 0.15s; }
  .add-btn:hover { background:var(--accent); color:#000; }
  .add-btn.remove { border-color:var(--accent2); color:var(--accent2); }
  .add-btn.remove:hover { background:var(--accent2); color:#fff; }

  .my-menu { background:#0f0f0f; border:1px solid var(--accent); border-radius:8px; padding:1.1rem 1.25rem; margin-bottom:1.5rem; }
  .my-menu .mm-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.8rem; }
  .my-menu .mm-title { font-family:'Bebas Neue',sans-serif; font-size:1.4rem; letter-spacing:0.05em; color:var(--accent); }
  .my-menu .mm-empty { font-size:0.8rem; color:var(--muted); padding:0.5rem 0; }
  .mm-item { display:flex; justify-content:space-between; align-items:center; padding:0.5rem 0; border-bottom:1px solid var(--border); font-size:0.82rem; gap:0.5rem; }
  .mm-item:last-child { border-bottom:none; }
  .mm-item .mm-x { color:var(--accent2); cursor:pointer; font-size:1.1rem; flex-shrink:0; }

  /* ===== 筋トレ日誌モード ===== */
  .log-form { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:1.25rem; margin-bottom:1.5rem; }
  .log-form .lf-row { margin-bottom:0.9rem; }
  .log-form label { display:block; font-size:0.72rem; color:var(--muted); letter-spacing:0.1em; margin-bottom:0.4rem; text-transform:uppercase; }
  .log-form input, .log-form select, .log-form textarea { width:100%; background:#0a0a0a; border:1px solid var(--border); color:var(--text); padding:0.6rem 0.8rem; border-radius:4px; font-family:'Noto Sans JP',sans-serif; font-size:0.85rem; }
  .log-form input:focus, .log-form select:focus, .log-form textarea:focus { outline:none; border-color:var(--accent); }
  .log-form textarea { resize:vertical; min-height:60px; }
  .lf-grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; }

  .log-stats { display:grid; grid-template-columns:repeat(3,1fr); gap:0.6rem; margin-bottom:1.5rem; }
  .stat-box { background:#0f0f0f; border:1px solid var(--border); border-radius:6px; padding:1rem; text-align:center; }
  .stat-box .st-num { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; color:var(--accent); line-height:1; }
  .stat-box .st-label { font-size:0.65rem; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; margin-top:0.3rem; }

  .log-entry { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:1rem 1.15rem; margin-bottom:0.6rem; position:relative; }
  .log-entry::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--accent); border-radius:6px 0 0 6px; }
  .log-entry .le-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem; }
  .log-entry .le-date { font-family:'Bebas Neue',sans-serif; font-size:1.2rem; letter-spacing:0.05em; }
  .log-entry .le-x { color:var(--accent2); cursor:pointer; font-size:1.1rem; }
  .log-entry .le-body { font-size:0.82rem; color:#bbb; line-height:1.7; }
  .log-entry .le-tag { display:inline-block; background:#222; color:var(--muted); font-size:0.65rem; padding:0.15rem 0.5rem; border-radius:2px; margin-right:0.4rem; margin-bottom:0.3rem; }
  .log-entry .le-note { margin-top:0.5rem; color:#999; font-size:0.78rem; font-style:italic; }
  .empty-state { text-align:center; color:var(--muted); padding:2.5rem 1rem; font-size:0.85rem; }

  @media(max-width:480px){
    .muscle-grid{grid-template-columns:repeat(3,1fr);}
    .symptom-grid{grid-template-columns:repeat(2,1fr);}
    header{padding:1.2rem 1rem 0.7rem;}
    .panel{padding:1.2rem 1rem;}
    .mode-tabs{margin:1.2rem 1rem 0; overflow-x:auto;}
    .tab-btn{min-width:120px; font-size:0.72rem;}
    .lf-grid3{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <h1>MUSCLE<br>NAVIGATOR</h1>
  <span>筋トレメニュー検索</span>
  <button onclick="window.open('./manual.html','_blank')" title="使用説明書" style="margin-left:auto;border:1px solid var(--border);background:transparent;color:var(--accent);border-radius:8px;padding:8px 12px;font-size:0.8rem;cursor:pointer;white-space:nowrap;font-family:'Noto Sans JP',sans-serif">📖 説明書</button>
</header>

<div class="mode-tabs">
  <button class="tab-btn active" onclick="switchTab('level')">
    <span class="tab-num">①</span>運動レベル判定
  </button>
  <button class="tab-btn" onclick="switchTab('muscle')">
    <span class="tab-num">②</span>筋肉から探す
  </button>
  <button class="tab-btn" onclick="switchTab('symptom')">
    <span class="tab-num">③</span>症状から探す
  </button>
  <button class="tab-btn" onclick="switchTab('care')">
    <span class="tab-num">④</span>ストレッチ/セルフケア
  </button>
  <button class="tab-btn" onclick="switchTab('custom')">
    <span class="tab-num">⑤</span>カスタマイズ
  </button>
  <button class="tab-btn" onclick="switchTab('journal')">
    <span class="tab-num">⑥</span>筋トレ日誌
  </button>
</div>

<!-- ① 運動レベル判定 -->
<div class="panel active" id="panel-level">
  <p class="section-label">あなたの運動レベルを判定します</p>
  <div id="quiz-container"></div>
  <button class="generate-btn" id="level-btn" onclick="calcLevel()">レベルを判定する</button>
  <div class="level-result" id="level-result"></div>
</div>

<!-- ② 筋肉から探す -->
<div class="panel" id="panel-muscle">
  <p class="section-label">鍛えたい部位を選択（複数可）</p>
  <div class="muscle-grid" id="muscle-grid"></div>
  <p class="section-label">絞り込み（任意）</p>
  <div class="filter-section">
    <div class="filter-label">難易度</div>
    <div class="filter-chips">
      <button class="filter-chip active" data-grp="lv" data-val="all" onclick="setResultFilter('lv','all')">すべて</button>
      <button class="filter-chip" data-grp="lv" data-val="初級" onclick="setResultFilter('lv','初級')">初級</button>
      <button class="filter-chip" data-grp="lv" data-val="中級" onclick="setResultFilter('lv','中級')">中級</button>
      <button class="filter-chip" data-grp="lv" data-val="上級" onclick="setResultFilter('lv','上級')">上級</button>
    </div>
    <div class="filter-label">器具</div>
    <div class="filter-chips">
      <button class="filter-chip active" data-grp="eq" data-val="all" onclick="setResultFilter('eq','all')">すべて</button>
      <button class="filter-chip" data-grp="eq" data-val="自重" onclick="setResultFilter('eq','自重')">自重・器具なし</button>
      <button class="filter-chip" data-grp="eq" data-val="椅子" onclick="setResultFilter('eq','椅子')">椅子・台</button>
      <button class="filter-chip" data-grp="eq" data-val="ダンベル" onclick="setResultFilter('eq','ダンベル')">ダンベル</button>
      <button class="filter-chip" data-grp="eq" data-val="チューブ" onclick="setResultFilter('eq','チューブ')">チューブ</button>
    </div>
  </div>
  <button class="generate-btn" id="muscle-btn" onclick="generateMuscle()" disabled>メニューを表示する</button>
  <div class="results" id="muscle-results"></div>
</div>

<!-- ③ 症状から探す -->
<div class="panel" id="panel-symptom">
  <p class="section-label">気になる症状を選択</p>
  <div class="symptom-grid" id="symptom-grid"></div>
  <button class="generate-btn generate-btn-red" id="symptom-btn" onclick="generateSymptom()" disabled>改善メニューを表示する</button>
  <div class="results" id="symptom-results"></div>
</div>

<!-- ④ ストレッチ / セルフケア -->
<div class="panel" id="panel-care">
  <p class="section-label">シーン・目的を選ぶ（すきま時間でOK）</p>
  <div class="care-grid" id="care-grid"></div>
  <div class="results" id="care-results"></div>
</div>

<!-- ⑤ カスタマイズ -->
<div class="panel" id="panel-custom">
  <div class="my-menu" id="my-menu"></div>
  <p class="section-label">種目を追加（フィルタ・検索で絞り込み）</p>
  <div class="cust-toolbar">
    <input type="text" class="search-box" id="cust-search" placeholder="種目名・部位で検索…" oninput="renderCustList()">
    <button class="filter-chip active" data-lv="all" onclick="setCustFilter('all')">すべて</button>
    <button class="filter-chip" data-lv="初級" onclick="setCustFilter('初級')">初級</button>
    <button class="filter-chip" data-lv="中級" onclick="setCustFilter('中級')">中級</button>
    <button class="filter-chip" data-lv="上級" onclick="setCustFilter('上級')">上級</button>
  </div>
  <div id="cust-list"></div>
</div>

<!-- ⑥ 筋トレ日誌 -->
<div class="panel" id="panel-journal">
  <div class="log-stats" id="log-stats"></div>
  <div class="log-form">
    <p class="section-label" style="margin-bottom:1rem;">トレーニングを記録</p>
    <div class="lf-row">
      <label>日付</label>
      <input type="date" id="log-date">
    </div>
    <div class="lf-row">
      <label>種目名</label>
      <input type="text" id="log-name" list="exercise-names" placeholder="例: スクワット">
      <datalist id="exercise-names"></datalist>
    </div>
    <div class="lf-row lf-grid3">
      <div><label>重量(kg)</label><input type="number" id="log-weight" placeholder="0" min="0" step="0.5"></div>
      <div><label>回数</label><input type="number" id="log-reps" placeholder="0" min="0"></div>
      <div><label>セット</label><input type="number" id="log-sets" placeholder="0" min="0"></div>
    </div>
    <div class="lf-row">
      <label>メモ（任意）</label>
      <textarea id="log-note" placeholder="調子・フォームの気づきなど"></textarea>
    </div>
    <button class="generate-btn" onclick="addLog()" style="margin-bottom:0;">記録する</button>
  </div>
  <p class="section-label">履歴</p>
  <div id="log-list"></div>
</div>

<!-- フローティング・ワークアウトバー -->
<div class="workout-fab" id="workout-fab">
  <div class="wf-info">
    <span class="wf-count" id="wf-count">0</span>
    <span class="wf-label">種目をワークアウトに追加中</span>
  </div>
  <div style="display:flex;flex-direction:column;gap:0.3rem;align-items:flex-end;">
    <button class="wf-start" onclick="openWorkoutReview()">スタート ▶</button>
    <button class="wf-view" onclick="clearWorkout()">クリア</button>
  </div>
</div>

<!-- タイマーオーバーレイ -->
<div class="timer-overlay" id="timer-overlay">
  <div class="timer-head">
    <span class="th-progress" id="th-progress"></span>
    <button class="th-close" onclick="closeTimer()">✕ 終了</button>
  </div>
  <div class="timer-progress-bar"><div class="timer-progress-fill" id="timer-progress-fill" style="width:0%"></div></div>
  <div class="timer-main" id="timer-main"></div>
</div>

<script>
const MUSCLES = [
  {id:'chest',   label:'胸',      icon:'💪'},
  {id:'back',    label:'背中',    icon:'🔙'},
  {id:'shoulder',label:'肩',      icon:'🏋️'},
  {id:'bicep',   label:'力こぶ',  icon:'💪'},
  {id:'tricep',  label:'二の腕',  icon:'🦾'},
  {id:'abs',     label:'腹筋',    icon:'⚡'},
  {id:'glute',   label:'お尻',    icon:'🍑'},
  {id:'quad',    label:'太もも前',icon:'🦵'},
  {id:'hamstring',label:'太もも後',icon:'🦵'},
  {id:'calf',    label:'ふくらはぎ',icon:'🦶'},
  {id:'trap',    label:'僧帽筋',  icon:'🦒'},
  {id:'core',    label:'体幹',    icon:'🎯'},
  {id:'forearm', label:'前腕',    icon:'🦿'},
  {id:'hand',    label:'手・指',  icon:'🤚'},
  {id:'oblique', label:'横腹',    icon:'🌀'},
  {id:'neck',    label:'首',      icon:'🦢'},
];

const SYMPTOMS = [
  {id:'stiff_shoulder', icon:'😤', name:'肩こり',       desc:'首・肩周りの慢性的なこわばり'},
  {id:'low_back',       icon:'😣', name:'腰痛',         desc:'腰部の痛み・重だるさ'},
  {id:'knee_pain',      icon:'🦵', name:'膝の痛み',     desc:'膝関節の違和感・痛み'},
  {id:'poor_posture',   icon:'🪑', name:'猫背・姿勢不良',desc:'前かがみ・巻き肩'},
  {id:'fatigue_legs',   icon:'😴', name:'足のむくみ',   desc:'下肢のだるさ・循環不良'},
  {id:'hip_tight',      icon:'🧘', name:'股関節の硬さ', desc:'開脚が苦手・可動域制限'},
  {id:'headache',       icon:'🤕', name:'緊張型頭痛',   desc:'首・肩からくる頭の重さ'},
  {id:'wrist',          icon:'✋', name:'手首・肘疲れ', desc:'デスクワーク由来の疲労'},
  {id:'muscle_sore',    icon:'🔥', name:'筋肉痛',       desc:'運動後の筋肉の張り・痛み'},
  {id:'whole_fatigue',  icon:'🥱', name:'全身の疲労感', desc:'だるさ・疲れが抜けない'},
  {id:'numbness',       icon:'⚡', name:'手足の痺れ',   desc:'指先・足先のしびれ・冷え'},
  {id:'dizziness',      icon:'💫', name:'ふらつき',     desc:'平衡感覚の低下・立ちくらみ'},
  {id:'eye_strain',     icon:'👁', name:'眼精疲労',     desc:'目の奥の重さ・かすみ'},
  {id:'cold_sensitivity',icon:'🧊', name:'冷え性',       desc:'手足の冷え・血行不良'},
  {id:'sleep',          icon:'🌙', name:'寝つきが悪い', desc:'入眠困難・睡眠の質低下'},
];

// ========== 筋肉別メニューデータ ==========
const MUSCLE_DATA = {
  chest: {
    summary:'大胸筋は胸の主要な筋肉で、押す動作全般に関わります。プッシュ系種目をメインに、大胸筋上部・中部・下部をバランスよく鍛えましょう。',
    exercises:[
      {name:'プッシュアップ（腕立て伏せ）',target:'大胸筋・上腕三頭筋・前鋸筋',level:'初級',equipment:'自重',time:'5分',sets:'3',reps:'10〜15回',rest:'60秒',description:'肩幅より少し広めに手をつき、体を一直線に保ちながら胸を床ギリギリまで下げる。肘は斜め後方に向ける。',caution:'腰が反らないよう腹圧を維持する'},
      {name:'ワイドプッシュアップ',target:'大胸筋外側・内側',level:'初級',equipment:'自重',time:'4分',sets:'3',reps:'10〜12回',rest:'60秒',description:'手幅を肩幅の1.5倍に広げたプッシュアップ。胸全体を広くストレッチできる。',caution:'手首に過度な負担がかかる場合は手首を内側に向ける'},
      {name:'ダイヤモンドプッシュアップ',target:'大胸筋内側・上腕三頭筋',level:'中級',equipment:'自重',time:'4分',sets:'3',reps:'8〜10回',rest:'60秒',description:'両手の親指と人差し指でひし形を作り、胸の真下に置いてプッシュアップ。内側の大胸筋に強い刺激。',caution:'肘が外に開かないよう注意'},
      {name:'デクラインプッシュアップ',target:'大胸筋下部',level:'中級',equipment:'椅子・台',time:'4分',sets:'3',reps:'10回',rest:'60秒',description:'足を椅子に乗せて、上体を斜め下向きにしたプッシュアップ。大胸筋下部を集中的に鍛える。',caution:'首に力が入りすぎないよう注意'},

      {name:'チェストプレス（ダンベル）',target:'大胸筋全体・三角筋前部',level:'中級',equipment:'ダンベル・ベンチ',time:'8分',sets:'4',reps:'10〜12回',rest:'90秒',description:'ベンチに仰向けになり、ダンベルを胸の高さから真上に押し上げる。下ろすときに肘が90度になるよう制御する。',caution:'ダンベルを落とさないよう手首をまっすぐ保つ'},

function selectOpt(qid, val, btn){
  quizAnswers[qid] = val;
  btn.parentElement.querySelectorAll('.opt-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
}

function calcLevel(){
  // performance score: freq, years, pushup, squat, plank, pullup (each 0-3) => max 18
  const keys = ['freq','years','pushup','squat','plank','pullup'];
  let answered = keys.filter(k=>quizAnswers[k]!==undefined).length;
  if(answered < keys.length){
    alert('すべての項目を選択してください（年齢は任意）');
    return;
  }
  let score = keys.reduce((s,k)=>s+(quizAnswers[k]||0),0); // 0-18
  // age adjustment: 50歳以上はやや控えめ判定
  const age = parseInt(quizAnswers.age||0);
  if(age>=60) score = Math.max(0, score-2);
  else if(age>=50) score = Math.max(0, score-1);

  // 懸垂が4回以上できれば中級以上を保証
  const pullupBonus = (quizAnswers.pullup>=2);

  let level, cls, desc, recLevel;
  const pct = Math.round(score/18*100);
  if(score>=12 || (score>=10 && pullupBonus)){
    level='ADVANCED'; cls='advanced'; recLevel='上級';
    desc='高い基礎筋力と運動習慣があります。上級種目に挑戦し、高重量・高難度の自重種目で更なる成長を狙えます。フォームの精度と漸進的過負荷を重視しましょう。';
  } else if(score>=6){
    level='INTERMEDIATE'; cls='intermediate'; recLevel='中級';
    desc='基礎が身についた中級者です。中級種目を中心に、徐々に上級種目を取り入れましょう。「懸垂やプランク2分」などの目標種目ができれば上級が見えてきます。';
  } else {
    level='BEGINNER'; cls='beginner'; recLevel='初級';
    desc='まずは初級種目で正しいフォームと運動習慣を作る時期です。週2〜3回の継続を最優先に。プッシュアップ15回・プランク1分が次の目標です。';
  }

  myRecommendedLevel = recLevel;
  const r = document.getElementById('level-result');
  r.innerHTML = `
    <div class="level-badge-big ${cls}">
      <div class="lv-label">YOUR LEVEL</div>
      <div class="lv-name">${level}</div>
      <div class="lv-score">スコア ${score} / 18　・　推奨難易度: <strong>${recLevel}</strong></div>
      <div class="level-bar"><div class="level-bar-fill" style="width:0%"></div></div>
      <div class="lv-desc">${desc}</div>
    </div>
    <button class="generate-btn" onclick="switchTab('custom')">推奨レベルの種目を見る →</button>`;
  r.classList.add('visible');
  setTimeout(()=>{ r.querySelector('.level-bar-fill').style.width = pct+'%'; }, 100);
  r.scrollIntoView({behavior:'smooth', block:'start'});
}

function switchTab(tab) {
  const tabs = ['level','muscle','symptom','care','custom','journal'];
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active', tabs[i]===tab));
  tabs.forEach(t=>{
    const p = document.getElementById('panel-'+t);
    if(p) p.classList.toggle('active', t===tab);

    // apply recommended level filter on first entry
    if(myRecommendedLevel && custFilter==='all' && custMenu.length===0){
      custFilter = myRecommendedLevel;
      document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('active', c.dataset.lv===myRecommendedLevel));

let resultFilters = { lv:'all', eq:'all' };

function setResultFilter(grp, val){

  document.querySelectorAll(`.filter-chip[data-grp="${grp}"]`).forEach(c=>c.classList.toggle('active', c.dataset.val===val));

function eqMatch(equipment, filter){
  if(filter==='all') return true;
  if(filter==='自重') return equipment.includes('自重') || equipment==='なし' || equipment.includes('壁');
  return equipment.includes(filter);
}

function generateMuscle() {
  const sel = MUSCLES.filter(m=>selectedMuscles.has(m.id));
  const results = document.getElementById('muscle-results');
  
  // Collect exercises from all selected muscles
  let allEx = [];
  let summaries = [];
  sel.forEach(m=>{
    const d = MUSCLE_DATA[m.id];
    if(d){ allEx.push(...d.exercises); summaries.push(d.summary); }
  });
  // Deduplicate by name
  const seen = new Set();
  allEx = allEx.filter(e=>{ if(seen.has(e.name)) return false; seen.add(e.name); return true; });
  // Apply 難易度・器具 filters
  allEx = allEx.filter(e=> levelMatch(e.level, resultFilters.lv) && eqMatch(e.equipment, resultFilters.eq));

  if(allEx.length===0){
    results.innerHTML = `
      <div class="results-header"><span class="results-title">YOUR MENU</span><span class="results-count">0 EXERCISES</span></div>
      <div class="empty-state">選択した条件に合う種目が見つかりませんでした。<br>難易度や器具の絞り込みを緩めてみてください。</div>`;
    results.classList.add('visible');
    return;
  }
  // Shuffle and limit
  allEx = allEx.sort(()=>Math.random()-0.5).slice(0,Math.min(allEx.length,8));

  const summary = sel.length===1
    ? MUSCLE_DATA[sel[0].id]?.summary
    : `${sel.map(m=>m.label).join('・')}を同時に鍛えるコンビネーションメニューです。各部位への刺激が効率よく入るよう種目を選択しています。`;

  results.innerHTML = `
    <div class="results-header">
      <span class="results-title">YOUR MENU</span>
      <span class="results-count">${allEx.length} EXERCISES</span>
    </div>
    <div class="plan-summary"><strong>プラン概要：</strong>${summary}</div>`;
  const cards = document.createElement('div');
  renderCards(cards, allEx, 'muscle');
  results.appendChild(cards);
  results.classList.add('visible');
  results.scrollIntoView({behavior:'smooth', block:'start'});
}

// ----- タイマー本体 -----
let timerState = null;
let timerInterval = null;

function parseRepCount(reps){
  // "10〜12回" -> 12, "30秒" -> 時間系, "限界まで" -> 10, "21回（7+7+7）" -> 21
  const r = String(reps);
  const secMatch = r.match(/(\d+)\s*秒/);
  if(secMatch && !/回/.test(r.split('秒')[1]||'')) return { type:'time', value:parseInt(secMatch[1]) };
  // 「○○回」の直前の数字を優先（例: 21回（7+7+7）→ 21）
  const repMatch = r.match(/(\d+)\s*回/);
  if(repMatch) return { type:'reps', value:parseInt(repMatch[1]) };
  if(secMatch) return { type:'time', value:parseInt(secMatch[1]) };
  const nums = r.match(/\d+/g);
  if(nums) return { type:'reps', value:parseInt(nums[nums.length-1]) };
  return { type:'reps', value:10 };
}

function beginWorkout(){
  const SETS = 3; // 仕様どおり3セット固定
  const steps = [];
  const lastEx = workoutQueue.length - 1;

  workoutQueue.forEach((ex, ei)=>{
    if(selectedTimerMode==='normal'){
      const P = TIMER_PRESET.normal; // work30 / setRest15 / exRest60
      for(let s=1; s<=SETS; s++){
        steps.push({ kind:'work', ex, set:s, totalSets:SETS, duration:P.work, label:`${P.work}秒運動` });
        const isLastSet = (s===SETS);
        if(isLastSet){
          if(ei!==lastEx) steps.push({ kind:'rest', ex, duration:P.exRest, label:'種目間休憩', nextLabel: workoutQueue[ei+1].name });
        } else {
          steps.push({ kind:'rest', ex, duration:P.setRest, label:'セット間休憩', nextLabel:`${ex.name}（セット${s+1}）` });
        }
      }
    } else {
      // 3/7式: 1セット = 3→4→5→6→7秒保持（間に15秒休憩）
      const P = TIMER_PRESET.method37;
      for(let s=1; s<=SETS; s++){
        P.holds.forEach((h, hi)=>{
          steps.push({ kind:'hold', ex, set:s, totalSets:SETS, duration:h, label:`${h}秒キープ`, holdIdx:hi+1, holdTotal:P.holds.length });
          // 各保持の間に15秒休憩（最後の7秒保持の後は入れない）
          if(hi < P.holds.length-1){
            steps.push({ kind:'rest', ex, duration:P.miniRest, label:'インターバル', nextLabel:`${P.holds[hi+1]}秒キープ` });
          }
        });
        const isLastSet = (s===SETS);
        if(isLastSet){
          if(ei!==lastEx) steps.push({ kind:'rest', ex, duration:P.exRest, label:'種目間休憩', nextLabel: workoutQueue[ei+1].name });
        } else {
          steps.push({ kind:'rest', ex, duration:P.setRest, label:'セット間休憩', nextLabel:`${ex.name}（セット${s+1}）` });
        }
      }
    }
  });

  if(steps.length===0) return;
  timerState = { steps, idx:0, remaining:steps[0].duration, paused:false, startTime:Date.now(), mode:selectedTimerMode };
  renderTimerStep();
  startTick();
}

function startTick(){
  clearInterval(timerInterval);
  timerInterval = setInterval(()=>{
    if(!timerState || timerState.paused) return;
    timerState.remaining--;
    if(timerState.remaining<=0){
      nextStep();
    } else {
      updateTimerDisplay();
    }
  }, 1000);
}

function nextStep(){
  if(!timerState) return;
  timerState.idx++;
  if(timerState.idx >= timerState.steps.length){
    finishWorkout();
    return;
  }
  // 次が運動/保持なら「開始」音、休憩なら「休憩」音
  const nextKind = timerState.steps[timerState.idx].kind;
  beep(nextKind==='rest' ? 'rest' : 'work');
  timerState.remaining = timerState.steps[timerState.idx].duration;
  renderTimerStep();
}

function renderTimerStep(){
  const st = timerState.steps[timerState.idx];
  const totalSteps = timerState.steps.length;
  document.getElementById('th-progress').textContent = `ステップ ${timerState.idx+1} / ${totalSteps}`;
  document.getElementById('timer-progress-fill').style.width = `${(timerState.idx/totalSteps)*100}%`;
  const main = document.getElementById('timer-main');
  const isRest = st.kind==='rest';
  const isHold = st.kind==='hold';
  const fp = st.ex.formPoints||[];
  const ringClass = isRest ? 'rest' : (isHold ? 'hold' : '');
  const phaseClass = isRest ? 'rest' : (isHold ? 'hold' : '');
  const phaseLabel = isRest ? `REST ${st.label||'休憩'}` : (isHold ? `HOLD 保持` : `WORK 運動`);
  // meta line
  let meta;
  if(isRest){
    meta = st.nextLabel ? `次は ${st.nextLabel}` : '休憩';
  } else if(isHold){
    meta = `セット ${st.set} / ${st.totalSets} ・ ${st.holdIdx}/${st.holdTotal}本目 ・ ${st.duration}秒キープ`;
  } else {
    meta = `セット ${st.set} / ${st.totalSets} ・ ${st.label}`;
  }
  main.innerHTML = `
    <div class="timer-phase ${phaseClass}">${phaseLabel}</div>
    <div class="timer-ex-name">${st.ex.name}</div>
    <div class="timer-ex-meta">${meta}</div>
    <div class="timer-ring ${ringClass}">
      <svg width="240" height="240" viewBox="0 0 240 240">
        <circle class="ring-bg" cx="120" cy="120" r="108"></circle>
        <circle class="ring-fg" id="ring-fg" cx="120" cy="120" r="108"
          stroke-dasharray="${2*Math.PI*108}" stroke-dashoffset="0"></circle>
      </svg>
      <div class="timer-count">
        <span class="tc-num" id="tc-num">${timerState.remaining}</span>
        <span class="tc-sub">秒</span>
      </div>
    </div>
    ${(!isRest && fp.length)?`
      <div class="timer-formpts">
        <div class="tf-title">✓ フォームのポイント</div>
        <ul>${fp.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>`:''}
    <div class="timer-controls">
      <button class="timer-btn" id="pause-btn" onclick="togglePause()">⏸ 一時停止</button>
      <button class="timer-btn" onclick="skipStep()">⏭ スキップ</button>
      <button class="timer-btn danger" onclick="stopWorkout()">■ 中止</button>
    </div>`;
  updateTimerDisplay();
}

function updateTimerDisplay(){
  const st = timerState.steps[timerState.idx];
  const num = document.getElementById('tc-num');
  if(num) num.textContent = timerState.remaining;
  const ring = document.getElementById('ring-fg');
  if(ring){
    const circ = 2*Math.PI*108;
    const frac = timerState.remaining / st.duration;
    ring.style.strokeDashoffset = circ*(1-frac);
  }
}

function togglePause(){
  if(!timerState) return;
  timerState.paused = !timerState.paused;
  const btn = document.getElementById('pause-btn');
  if(btn) btn.textContent = timerState.paused ? '▶ 再開' : '⏸ 一時停止';
}

function skipStep(){ if(timerState) nextStep(); }

function stopWorkout(){
  if(confirm('ワークアウトを中止しますか？（途中までの記録は保存されません）')){
    clearInterval(timerInterval);
    timerState = null;
    closeTimer();
  }
}

function finishWorkout(){
  clearInterval(timerInterval);
  beep('finish');
  const elapsedMin = Math.round((Date.now()-timerState.startTime)/60000);
  const mode = timerState.mode || selectedTimerMode;
  const modeLabel = mode==='method37' ? '3/7式' : '通常式';
  const repsLabel = mode==='method37' ? '3→4→5→6→7秒保持' : '30秒×3';
  // 自動で日誌に記録
  const today = new Date().toISOString().slice(0,10);
  const logs = loadLogs();
  workoutQueue.forEach(ex=>{
    logs.push({
      id: Date.now()+Math.floor(Math.random()*1000),
      date: today,
      name: ex.name,
      weight: '',
      reps: repsLabel,
      sets: '3',
      note: `タイマー（${modeLabel}）で実施（自動記録）`
    });
  });
  saveLogs(logs);

  document.getElementById('th-progress').textContent = '完了！';
  document.getElementById('timer-progress-fill').style.width = '100%';
  const main = document.getElementById('timer-main');
  main.innerHTML = `
    <div style="text-align:center;">
      <div class="timer-phase">🎉 WORKOUT COMPLETE</div>
      <div class="timer-ex-name" style="margin:1rem 0;">お疲れさまでした！</div>
      <div class="timer-ex-meta">${workoutQueue.length}種目 ・ ${modeLabel} ・ 約${elapsedMin}分<br>結果は「筋トレ日誌」に自動で記録されました。</div>
      <div class="timer-controls" style="margin-top:2rem;">
        <button class="timer-btn primary" onclick="closeTimer(); clearWorkout(); switchTab('journal');">記録を見る</button>
      </div>
    </div>`;
  timerState = null;
}

function closeTimer(){
  clearInterval(timerInterval);
  document.getElementById('timer-overlay').classList.remove('visible');
  document.body.style.overflow='';
}

// シンプルな音／バイブのキュー
function beep(type){
  try {
    if(navigator.vibrate){ navigator.vibrate(type==='finish'?[200,100,200]:150); }
    const ctx = beep._ctx || (beep._ctx = new (window.AudioContext||window.webkitAudioContext)());
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = type==='work'?660:(type==='finish'?880:440);
    g.gain.value = 0.1;
    o.start(); o.stop(ctx.currentTime+0.18);
  } catch(e){}
}
</script>

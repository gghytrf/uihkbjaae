<!DOCTYPE html>
<html lang="ja">
<head>
<script>
/* ===== 統合アプリ用ガード（自動挿入・元コードは未変更）=====
   iframe 内で動くとき、各アプリ独自の Service Worker 登録／キャッシュ操作／
   バージョン確認を無効化し、キャッシュとバージョン管理を親（統合ホーム）へ
   一元化します。localStorage（学習データ・カルテ等）はそのまま使えます。 */
(function(){
  try{
    if (window.top === window.self) return; // 単体起動時は何もしない

    // 1) Service Worker を無害なスタブに
    var swStub = {
      register:function(){ return Promise.reject(new Error('SW disabled in integrated app')); },
      getRegistration:function(){ return Promise.resolve(undefined); },
      getRegistrations:function(){ return Promise.resolve([]); },
      addEventListener:function(){}, removeEventListener:function(){},
      get controller(){ return null; },
      ready:new Promise(function(){})
    };
    try{ Object.defineProperty(navigator,'serviceWorker',{get:function(){return swStub;},configurable:true}); }catch(e){}

    // 2) Cache Storage を無効化（子アプリが親のキャッシュを消さないように）
    var noop0=function(){return Promise.resolve();};
    function neutralizeCaches(){
      try{
        var cacheStub={
          open:function(){return Promise.resolve({addAll:noop0,add:noop0,put:noop0,
            match:function(){return Promise.resolve(undefined);},delete:function(){return Promise.resolve(false);},
            keys:function(){return Promise.resolve([]);}});},
          keys:function(){return Promise.resolve([]);},
          delete:function(){return Promise.resolve(false);},
          match:function(){return Promise.resolve(undefined);},
          has:function(){return Promise.resolve(false);}
        };
        try{ Object.defineProperty(window,'caches',{get:function(){return cacheStub;},configurable:true}); }
        catch(e){
          // defineProperty が不可なら既存オブジェクトのメソッドを直接無害化
          if(window.caches){
            try{ window.caches.keys=function(){return Promise.resolve([]);}; }catch(_){}
            try{ window.caches.delete=function(){return Promise.resolve(false);}; }catch(_){}
            try{ window.caches.open=cacheStub.open; }catch(_){}
          }
        }
      }catch(e){}
    }
    neutralizeCaches();

    // 3) アプリ独自の「更新」ボタンを隠す（親の「更新確認」に一本化）
    var css='/* marubatsu: 非表示にする独自要素なし */';
    function injectCss(){ try{ var s=document.createElement('style'); s.textContent=css; (document.head||document.documentElement).appendChild(s);}catch(e){} }
    if(document.head){ injectCss(); }
    else { document.addEventListener('DOMContentLoaded', injectCss); }
  }catch(e){}

    // ===== コピー無効化（コンテンツ保護）=====
    // テキスト選択・右クリック・長押しを抑止。ただし入力欄は除外（カルテ/検索/メモは操作可）。
    var cpCss = document.createElement('style');
    cpCss.textContent =
      'html{-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;' +
      '-webkit-touch-callout:none;}' +
      'input,textarea,[contenteditable="true"],[contenteditable=""]{' +
      '-webkit-user-select:text !important;-moz-user-select:text !important;' +
      '-ms-user-select:text !important;user-select:text !important;-webkit-touch-callout:default !important;}';
    (document.head||document.documentElement).appendChild(cpCss);
    var isEditable = function(t){
      if(!t) return false;
      var tag=(t.tagName||'').toLowerCase();
      if(tag==='input'||tag==='textarea') return true;
      if(t.isContentEditable) return true;
      return false;
    };
    document.addEventListener('contextmenu', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});
    document.addEventListener('copy', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});
    document.addEventListener('cut', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});
    document.addEventListener('dragstart', function(e){ if(!isEditable(e.target)) e.preventDefault(); }, {capture:true});

  })();
</script>

<style>

  .stat-box .num{ font-family:var(--serif); font-size:24px; font-weight:700; color:var(--main); }

</style>

<script>
/* ====== 状態 ====== */
let ALL = [];               // 全問題
let YEAR_LABELS = {};       // year値 → 表示ラベル
const LS = 'marubatsu_progress_v1';
let progress = loadProgress();

let session = null;         // {queue, idx, correct, wrong, answered, filter}

function loadProgress(){
  try{
    const raw = localStorage.getItem(LS);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { total:0, correct:0, streak:0, bestStreak:0, wrongIds:[], bySubject:{} };
}
function saveProgress(){ try{ localStorage.setItem(LS, JSON.stringify(progress)); }catch(e){} }

/* ====== データ読み込み（国試学習アプリと同じ方式）======
   ・問題データは IndexedDB に保存して再利用（毎回の大きな通信を避ける）。
   ・初回、または前回確認から48時間経過時のみ、ネットから取得して保存。
   ・アプリ起動時・フォアグラウンド復帰時に確認する（ホーム側では取得しない）。 */
const MB_DB = 'MarubatsuDB';
const MB_CHECK_MS = 48 * 60 * 60 * 1000;
let _mbdb = null;

function mbOpenDB(){
  return new Promise((resolve, reject)=>{
    const req = indexedDB.open(MB_DB, 1);
    req.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains('questions')) db.createObjectStore('questions', { keyPath:'id' });
      if(!db.objectStoreNames.contains('meta')) db.createObjectStore('meta', { keyPath:'key' });
    };
    req.onsuccess = ()=>resolve(req.result);
    req.onerror = ()=>reject(req.error);
  });
}
function mbGetAll(store){
  return new Promise((resolve,reject)=>{
    const tx=_mbdb.transaction(store,'readonly'); const r=tx.objectStore(store).getAll();
    r.onsuccess=()=>resolve(r.result||[]); r.onerror=()=>reject(r.error);
  });
}
function mbGetMeta(key){
  return new Promise((resolve)=>{
    const tx=_mbdb.transaction('meta','readonly'); const r=tx.objectStore('meta').get(key);
    r.onsuccess=()=>resolve(r.result?r.result.value:null); r.onerror=()=>resolve(null);
  });
}
function mbPutMeta(key,value){
  return new Promise((resolve)=>{
    const tx=_mbdb.transaction('meta','readwrite'); tx.objectStore('meta').put({key,value});
    tx.oncomplete=()=>resolve(); tx.onerror=()=>resolve();
  });
}
async function mbStoreQuestions(list){
  return new Promise((resolve,reject)=>{
    const tx=_mbdb.transaction('questions','readwrite');
    const os=tx.objectStore('questions'); os.clear();
    list.forEach(q=>{ if(q && q.id!=null) os.put(q); });
    tx.oncomplete=()=>resolve(); tx.onerror=()=>reject(tx.error);
  });
}
// ネットから取得して IndexedDB に保存（成功時 true）
async function mbFetchAndStore(){
  try{
    const res = await fetch('./marubatsu_questions.json?_=' + Date.now(), { cache:'no-store' });
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    const list = data.questions || [];
    await mbStoreQuestions(list);
    await mbPutMeta('lastChecked', Date.now());
    await mbPutMeta('dataVersion', data.lastUpdated || data.schemaVersion || '');
    ALL = list;
    return true;
  }catch(e){ console.warn('問題データ取得スキップ（オフライン等）:', e.message); return false; }
}

async function loadData(){
  try{
    _mbdb = await mbOpenDB();
    let cached = await mbGetAll('questions');
    if(cached.length === 0){
      // 初回：ネットから取得して保存
      const ok = await mbFetchAndStore();
      if(!ok){
        document.querySelector('#home .card').innerHTML =
          '<div class="empty-state"><div class="big">📶</div>初回はインターネット接続が必要です。<br>接続してから開き直してください。</div>';
        return;
      }
    }else{
      ALL = cached;
      // 48時間経過していれば、バックグラウンドで最新を確認・差し替え
      const last = await mbGetMeta('lastChecked') || 0;
      if(Date.now() - last >= MB_CHECK_MS){ mbFetchAndStore().then(()=>{ buildFilters(); refreshHome(); }); }
    }
    buildFilters();
    refreshHome();
    toast('問題データ読込: ' + ALL.length + '問');
  }catch(e){
    // IndexedDB が使えない環境では従来どおり都度取得にフォールバック
    try{
      const res = await fetch('./marubatsu_questions.json?_=' + Date.now());
      const data = await res.json();
      ALL = data.questions || [];
      buildFilters(); refreshHome();
      toast('問題データ読込: ' + ALL.length + '問');
    }catch(e2){
      document.querySelector('#home .card').innerHTML =
        '<div class="empty-state"><div class="big">⚠️</div>問題データを読み込めませんでした。<br>インターネット接続を確認してください。</div>';
      console.error(e2);
    }
  }
}

// フォアグラウンド復帰時：48時間以上経過していれば確認（ホーム側では取得しない）
document.addEventListener('visibilitychange', async ()=>{
  if(document.hidden || !_mbdb) return;
  try{
    const last = await mbGetMeta('lastChecked') || 0;
    if(Date.now() - last >= MB_CHECK_MS){
      const ok = await mbFetchAndStore();
      if(ok){ buildFilters(); refreshHome(); }
    }
  }catch(e){}
});

function buildFilters(){
  // 年度（出現順を保ちつつ、数値年→ラベル化）
  const examName = {hari_kyu:'はりきゅう', amashi:'あマ指'};
  const years = [];
  ALL.forEach(q=>{ if(!years.includes(String(q.year))) years.push(String(q.year)); });
  const yearSel = document.getElementById('f-year');
  years.forEach(y=>{
    const label = /^\d+$/.test(y) ? ('第'+y+'回') : y;
    YEAR_LABELS[y] = label;
    const o = document.createElement('option'); o.value=y; o.textContent=label; yearSel.appendChild(o);
  });
  // 科目
  const subjects = [...new Set(ALL.map(q=>q.subject))].sort();
  const subSel = document.getElementById('f-subject');
  subjects.forEach(s=>{ const o=document.createElement('option'); o.value=s; o.textContent=s; subSel.appendChild(o); });
  // 科目別リスト
  const list = document.getElementById('subject-list');
  list.innerHTML = '';
  subjects.forEach(s=>{
    const cnt = ALL.filter(q=>q.subject===s).length;
    const div = document.createElement('div');
    div.className='subject-item';
    div.innerHTML = `<span>${s}</span><span class="count">${cnt}問</span>`;
    div.onclick = ()=> startQuiz('subject', {subject:s});
    list.appendChild(div);
  });
}

/* ====== 画面遷移 ====== */
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('nav-home').classList.toggle('active', id!=='stats');
  document.getElementById('nav-stats').classList.toggle('active', id==='stats');
  window.scrollTo(0,0);
}
function openStats(){ refreshStats(); showScreen('stats'); }

/* ====== 出題開始 ====== */
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }

function startQuiz(mode, opt){
  let pool = ALL;
  let filter = {mode};
  if(mode==='subject'){ pool = ALL.filter(q=>q.subject===opt.subject); filter.subject=opt.subject; }
  beginSession(pool, filter);
}
function startFiltered(){
  const exam = document.querySelector('input[name="f-exam"]:checked').value;
  const year = document.getElementById('f-year').value;
  const subject = document.getElementById('f-subject').value;
  let pool = ALL;
  if(exam!=='all') pool = pool.filter(q=>q.examType===exam);
  if(year!=='all') pool = pool.filter(q=>String(q.year)===year);
  if(subject!=='all') pool = pool.filter(q=>q.subject===subject);
  if(pool.length===0){ toast('該当する問題がありません'); return; }
  beginSession(pool, {mode:'filter', exam, year, subject});
}
function startReview(){
  if(progress.wrongIds.length===0){ toast('復習リストは空です'); return; }
  const set = new Set(progress.wrongIds);
  const pool = ALL.filter(q=>set.has(q.id));
  beginSession(pool, {mode:'review'});
}

function beginSession(pool, filter){
  const MAX = 50; // 1セッション最大問数
  let queue = shuffle(pool);
  if(queue.length>MAX) queue = queue.slice(0,MAX);
  session = { queue, idx:0, correct:0, wrong:0, answered:0, filter };
  showScreen('quiz');
  renderQuestion();
}

/* ====== 問題描画 ====== */
function renderQuestion(){
  const q = session.queue[session.idx];
  // メタ
  const meta = document.getElementById('q-meta');
  const examLabel = q.examType==='amashi' ? 'あマ指' : 'はりきゅう';
  const examCls = q.examType==='amashi' ? 'exam-type amashi' : 'exam-type';
  const yLabel = YEAR_LABELS[String(q.year)] || q.year;
  meta.innerHTML =
    `<span class="badge ${examCls}">${examLabel}</span>`+
    `<span class="badge subject">${q.subject}</span>`+
    `<span>${yLabel}</span>`;
  document.getElementById('q-text').textContent = q.questionText;

  // リセット
  document.getElementById('result-banner').style.display='none';
  document.getElementById('answer-area').style.display='none';
  document.getElementById('quiz-nav').style.display='none';
  const bm=document.getElementById('btn-maru'), bb=document.getElementById('btn-batsu');
  [bm,bb].forEach(b=>{ b.disabled=false; b.classList.remove('chosen'); });

  // 進捗
  document.getElementById('q-progress').textContent = (session.idx+1)+' / '+session.queue.length;
  const rate = session.answered ? Math.round(session.correct/session.answered*100) : 0;
  document.getElementById('q-rate').textContent = rate+'%';
  document.getElementById('q-bar').style.width = (session.idx/session.queue.length*100)+'%';
}

function answer(choice){
  const q = session.queue[session.idx];
  const correct = (choice === q.correctAnswer);
  const bm=document.getElementById('btn-maru'), bb=document.getElementById('btn-batsu');
  bm.disabled=true; bb.disabled=true;
  (choice==='○'?bm:bb).classList.add('chosen');

  // バナー
  const banner = document.getElementById('result-banner');
  banner.style.display='block';
  if(correct){
    banner.className='result-banner correct';
    banner.textContent='正解！　答え：'+q.correctAnswer;
  }else{
    banner.className='result-banner incorrect';
    banner.textContent='不正解　正答：'+q.correctAnswer;
  }
  // 解説
  document.getElementById('q-explanation').textContent = q.explanation || '（解説なし）';
  document.getElementById('answer-area').style.display='block';
  document.getElementById('quiz-nav').style.display='flex';

  // 集計
  session.answered++;
  if(correct){ session.correct++; } else { session.wrong++; }
  recordAnswer(q, correct);

  // 最終問なら次ボタン文言変更
  if(session.idx >= session.queue.length-1){
    document.getElementById('next-btn').textContent='結果を見る';
  }
}

function nextQuestion(){
  if(session.idx >= session.queue.length-1){ finishSession(); return; }
  session.idx++;
  renderQuestion();
  window.scrollTo(0,0);
}
function quitQuiz(){ finishSession(); }

function finishSession(){
  const t=session.answered, c=session.correct, w=session.wrong;
  document.getElementById('res-total').textContent=t;
  document.getElementById('res-correct').textContent=c;
  document.getElementById('res-wrong').textContent=w;
  document.getElementById('res-rate').textContent = t ? Math.round(c/t*100)+'%' : '–';
  showScreen('result');
  refreshHome();
}
function restartSame(){
  const f = session.filter;
  if(f.mode==='all') startQuiz('all');
  else if(f.mode==='subject') startQuiz('subject',{subject:f.subject});
  else if(f.mode==='review') startReview();
  else { // filter
    let pool=ALL;
    if(f.exam!=='all') pool=pool.filter(q=>q.examType===f.exam);
    if(f.year!=='all') pool=pool.filter(q=>String(q.year)===f.year);
    if(f.subject!=='all') pool=pool.filter(q=>q.subject===f.subject);
    beginSession(pool, f);
  }
}

/* ====== 記録 ====== */
function recordAnswer(q, correct){
  progress.total++;
  if(correct){
    progress.correct++;
    progress.streak++;
    if(progress.streak>progress.bestStreak) progress.bestStreak=progress.streak;
    // 復習リストから除去
    const i=progress.wrongIds.indexOf(q.id);
    if(i>=0) progress.wrongIds.splice(i,1);
  }else{
    progress.streak=0;
    if(!progress.wrongIds.includes(q.id)) progress.wrongIds.push(q.id);
  }
  const s = progress.bySubject[q.subject] || {total:0,correct:0};
  s.total++; if(correct) s.correct++;
  progress.bySubject[q.subject]=s;
  saveProgress();
}

/* ====== 表示更新 ====== */
function refreshHome(){
  document.getElementById('st-total').textContent = progress.total;
  document.getElementById('st-rate').textContent = progress.total ? Math.round(progress.correct/progress.total*100)+'%' : '–';
  document.getElementById('st-streak').textContent = progress.streak;
  document.getElementById('wrong-count').textContent = progress.wrongIds.length;
}
function refreshStats(){
  document.getElementById('all-total').textContent=progress.total;
  document.getElementById('all-correct').textContent=progress.correct;
  document.getElementById('all-wrong').textContent=progress.total-progress.correct;
  document.getElementById('all-rate').textContent = progress.total ? Math.round(progress.correct/progress.total*100)+'%' : '–';
  const box=document.getElementById('subject-stats');
  const subs=Object.keys(progress.bySubject);
  if(subs.length===0){ box.innerHTML='<div class="empty-state">まだ記録がありません</div>'; return; }
  let html='<table class="review"><tr><th>科目</th><th>正答率</th><th>解答</th></tr>';
  subs.sort((a,b)=> (progress.bySubject[b].correct/progress.bySubject[b].total)-(progress.bySubject[a].correct/progress.bySubject[a].total));
  subs.forEach(s=>{
    const d=progress.bySubject[s]; const r=Math.round(d.correct/d.total*100);
    html+=`<tr><td>${s}</td><td>${r}%</td><td>${d.correct}/${d.total}</td></tr>`;
  });
  html+='</table>';
  box.innerHTML=html;
}
function resetProgress(){
  if(!confirm('学習記録をすべて消去します。よろしいですか？')) return;
  progress={ total:0, correct:0, streak:0, bestStreak:0, wrongIds:[], bySubject:{} };
  saveProgress(); refreshHome(); refreshStats();
  toast('記録をリセットしました');
}

/* ====== トースト ====== */
let toastTimer=null;
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2000);
}

/* ====== 起動 ====== */
loadData();
</script>
